<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luyên tập </title>
  </head>
  <body>
    <form action="">
      <label for="">User Name:</label>
      <input type="text" name="" id="" placeholder="Nhập Tên" />
      <br /><br />
      <label for="">Password:</label>
      <input type="password" name="" id="" placeholder="Password" />
      <br /><br />
      <input type="submit" value="Send" />
    </form>
    <h1>Giới tính ?</h1>
    <form action="">
      <input type="checkbox" name="Nam" id="" />Nam
      <input type="checkbox" name="Nữ" id="" />Nữ <br /><br />
      <input type="submit" value="Send" />
      <p>Tăng giảm âm lượng</p>
      <br /><br />
      <input type="range" name="volume" id="" value="50" />
      <input type="submit" value="Send me" />
      <br />
      <input type="number" name="number" id="" value="35" />
      <input type="submit" value="Send me" />
    </form>
    <br />
    <h1>lien ket link</h1>
    <form action="https://www.google.com/search">
      <input type="text" name="tho" id="" />
      <input type="submit" name="Search" id />
      <br /><br />
      <label>
        Điền nội dung:
        <br />
        <textarea name="" id="" cols="30" rows="6"></textarea>
      </label>
      <br /><br />

      <label for="">Chọn thành phố:</label>
      <select name="" id="" required>
        <option value="">-Chọn Thành Phố-</option>
        <optgroup label="Miền Tây">
          <option value="">Trà Vinh</option>
          <option value="">Bến Tre</option>
        </optgroup>
        <optgroup label="Miền Bắc">
          <option value="">Hà Nội</option>
          <option value="">Bắc Ninh</option>
        </optgroup>
      </select>
      <button>Xác Nhận</button>
    </form>
  </body>
</html>
